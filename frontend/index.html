<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Segmented Video Player</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="page">
    <section class="app">
      <div class="player-panel">
        <div class="player-header">
          <div>
            <h1 id="videoTitle">Segmented Video Player</h1>
            <p id="currentSegmentText">Current segment: --</p>
          </div>
        </div>

        <div class="video-wrapper" id="videoWrapper">
          <video
            id="video"
            class="video"
            poster="background.jpg"
            preload="metadata"
          >
            Your browser does not support HTML video.
          </video>

          <button class="big-play" id="bigPlay" aria-label="Play video">
            ▶
          </button>
        </div>

        <div class="controls">
          <button id="playPause" aria-label="Play or pause">
            Play
          </button>

          <span id="currentTime">0:00</span>

          <input
            id="progress"
            type="range"
            min="0"
            max="100"
            value="0"
            step="0.1"
            aria-label="Video progress"
          />

          <span id="duration">0:00</span>

          <label class="volume-wrap">
            Volume
            <input
              id="volume"
              type="range"
              min="0"
              max="1"
              step="0.05"
              value="1"
              aria-label="Volume"
            />
          </label>

          <button id="fullscreen" aria-label="Enter fullscreen">
            Fullscreen
          </button>
        </div>

        <section class="segment-section">
          <div class="segment-actions">
            <button id="playContentOnly" class="action-btn green-btn">
              Play Content Only: Off
            </button>

            <button id="skipNonContent" class="action-btn red-btn">
              Skip Non-Content
            </button>
          </div>

          <div class="segment-bar" id="segmentBar"></div>

          <div class="legend">
            <span>
              <i class="legend-box legend-content"></i>
              Content
            </span>

            <span>
              <i class="legend-box legend-intro"></i>
              Intro
            </span>

            <span>
              <i class="legend-box legend-ad"></i>
              Ad
            </span>

            <span>
              <i class="legend-box legend-promo"></i>
              Promo
            </span>

            <span>
              <i class="legend-box legend-outro"></i>
              Outro
            </span>

            <span>
              <i class="legend-box legend-non-content"></i>
              Transition / Other
            </span>
          </div>
        </section>
      </div>

      <aside class="sidebar">
        <h2>Segment Overview</h2>
        <div id="segmentList" class="segment-list"></div>
      </aside>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
